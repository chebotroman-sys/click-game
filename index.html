<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра-кликер</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Игра-кликер</h1>

  <div class="panel">
    <div>Очки: <span id="score">0</span></div>
    <div>Время: <span id="timer">30</span></div>
    <div>Рекорд: <span id="record">0</span></div>
  </div>

  <div id="playArea">
    <button id="clickButton">Жми!</button>
  </div>

  <div id="message"></div>

  <button id="restartButton">Играть заново</button>

  <script src="script.js"></script>
</body>
</html>
